<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 12 Months of Memories</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Special+Elite&display=swap');

        /* --- UPDATED: GATEKEEPER OVERLAY STYLES --- */
        #anniversary-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease, visibility 1s;
        }

        .overlay-content { text-align: center; color: white; font-family: 'Dancing Script', cursive; padding: 20px; }

        /* Anniversary title with your gold glow */
        .overlay-content h1 {
            font-size: 4.5rem; color: #ffd700;
            text-shadow: 0 0 10px #fff7d1, 0 0 20px #ffcc00, 0 0 30px #ffcc00; margin-bottom: 25px;
        }

        /* Question text with typewriter font */
        .overlay-content p { font-family: 'Special Elite', cursive; font-size: 1.3rem; margin-bottom: 35px; color: #eee; }

        /* The 'Yes, let's go!' button */
        .journey-btn {
            background: #ff4d6d; color: white; border: none; padding: 18px 45px;
            font-size: 1.6rem; font-family: 'Dancing Script', cursive; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 77, 109, 0.7);
            transition: transform 0.3s, background 0.3s;
        }

        .journey-btn:hover { transform: scale(1.1); background: #ff758f; }

        /* --- UPDATED: PINK HEARTS WITH BLUE GLOW --- */
        .heart-pop {
            position: absolute; font-size: 1.8rem; pointer-events: none; z-index: 10000;
            color: #ffb6c1; /* Soft pink heart */
            
            /* ADDED: Blue glow text-shadow */
            text-shadow: 
                0 0 10px #00ffff, /* Tight aqua-blue glow */
                0 0 20px #0000ff, /* Diffused deep-blue glow */
                0 0 30px #0000ff;
            
            animation: flyAndFade 3s forwards;
        }

        @keyframes flyAndFade {
            0% { transform: translate(0, 0) scale(1); opacity: 1; filter: blur(0); }
            100% { transform: translate(var(--x), var(--y)) scale(1.6); opacity: 0; filter: blur(3px); }
        }

        /* --- UPDATED: MAIN SITE STYLES WITH ADDED BACKGROUND EFFECTS --- */
        body {
            background-color: #fdfaf0;
            background-image: linear-gradient(#9198e5 1px, transparent 1px), linear-gradient(90deg, #9198e5 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0; padding: 60px; display: flex; flex-direction: column; align-items: center;
            font-family: 'Special Elite', cursive; overflow-x: hidden; min-height: 100vh;
            transition: background-color 1.5s ease; /* To blend in with reveal */
        }

        /* Subtle backlighting effect once revealed */
        body.site-revealed {
            background-color: #fff0f5; /* Blends to warm pink to connect with hearts */
            box-shadow: inset 0 0 150px rgba(255, 182, 193, 0.4); /* Glow on main site */
        }

        body::before, body::after {
            content: "💖 ✨ 🌸 🌙 🍦 🍕 🌻 🐶 🐱 🌹 💖 ✨ 🌸 🌙 🍦 🍕 🌻 🐶 🐱 🌹 💖 ✨ 🌸 🌙 🍦 🍕 🌻 🐶 🐱 🌹"; 
            position: fixed; font-size: 1.5rem; white-space: nowrap; opacity: 0.7; z-index: 100; pointer-events: none;
        }
        body::before { top: 10px; left: 50%; transform: translateX(-50%); width: 95%; text-align: center; }
        body::after { bottom: 10px; left: 50%; transform: translateX(-50%); width: 95%; text-align: center; }

        .main-heading {
            font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ffd700;
            margin-bottom: 80px; text-align: center;
            text-shadow: 2px 2px 0px #b8860b, 0 0 10px #fff7d1, 0 0 20px #ffcc00;
            transform: perspective(500px) translateZ(20px);
        }

        .library-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 50px 30px;
            width: 100%; max-width: 1100px; perspective: 2000px;
        }

        .book {
            width: 180px; height: 250px; position: relative; transform-style: preserve-3d;
            transition: transform 0.6s; cursor: pointer; margin: auto;
        }
        .book:hover { transform: translateZ(30px) rotateY(-15deg); }

        .page {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            transform-origin: left; transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            background: white; border-radius: 0 5px 5px 0; box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .front {
            background: #ffb6c1; color: #fff; z-index: 2;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid #ff9ead; backface-visibility: hidden; position: relative;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .inner {
            background: #fff; z-index: 1; padding: 10px; display: flex;
            flex-direction: column; align-items: center; font-size: 0.7rem; text-align: center;
        }
        .inner img { width: 100%; height: 65%; object-fit: cover; border: 3px solid #f0f0f0; margin-bottom: 5px;}

        .book.open .front { transform: rotateY(-160deg); }

        @media (max-width: 900px) {
            .library-grid { grid-template-columns: repeat(2, 1fr); }
            .main-heading { font-size: 2.5rem; }
            .overlay-content h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="anniversary-overlay">
        <div class="overlay-content">
            <h1>Happy ANNIVERSARY! ❤️</h1>
            <p>Do you want to go through one entire month?</p>
            <button class="journey-btn" onclick="revealSite(event)">Yes, let's go!</button>
        </div>
    </div>

    <h1 class="main-heading">Successfully completed SEASON-1 ❤️</h1>

    <div class="library-grid" id="bookGrid"></div>

    <script>
        // --- UPDATED: FUNCTION TO REVEAL SITE WITH INITIAL POP EFFECT ---
        function revealSite(event) {
            // First, do a big burst of hearts right on the button click!
            for (let i = 0; i < 20; i++) {
                spawnHeart(event.pageX, event.pageY, true);
            }

            // Animate overlay fading out
            const overlay = document.getElementById('anniversary-overlay');
            overlay.style.opacity = '0';
            
            // Subtle body shift
            document.body.classList.add('site-revealed');

            setTimeout(() => {
                overlay.style.visibility = 'hidden';
            }, 1000); // Wait for transition
        }

        // --- 1. MEMORY DATA ---
        const memoryData = [
            { month: "March",      emoji: "☀️", msg: "<b>30th...he proposed me while riding a scooty and i said <br><br><em>YES🥂✨!!</em></br></br></b>", img: "https://i.ibb.co/6zZB2pD/1000076361.jpg" },
            { month: "April",      emoji: "☔", msg: "<b>Our First trip together✨</b>", img: "https://i.ibb.co/LDxJK1K5/image.jpg"},
            { month: "May",        emoji: "🦋", msg: "<b>Bank Account Khula🧣🌸😂</b>", img: "https://i.ibb.co/Vp5mWtwB/image.jpg" },
            { month: "June",       emoji: "🏖️", msg: "<b>My life started singing<br><br><em>AYE UDI UDI🎶</em></br></br>", img: "https://i.ibb.co/VkD1zCG/1000076363.jpg"},
            { month: "July",       emoji: "🍦", msg: "<b>Sweet treats...🍕🍔🌮🍩</b>", img: "https://i.ibb.co/5DSJ5dc/1000076371.jpg"},
            { month: "August",     emoji: "🌻", msg: "<b>My two beloved men in one frame✨💖</b>", img: "https://i.ibb.co/W43x5K48/image.jpg"},
            { month: "September", emoji: "🍁", msg: "<b>how a randon day turns out to be fun with you☀️🦋✨</b>", img: "https://i.ibb.co/8ns4h812/image.jpg"},
            { month: "October",    emoji: "🎃", msg: "<b>Apli pahili Diwali✨✨✨</b>", img: "https://i.ibb.co/jkzq8xtT/image.jpg"},
            { month: "November",   emoji: "🧣", msg: "<b>Pampered...pamper...and will always pamper🍦🌻</b>", img: "https://i.ibb.co/4n49S2Bc/image.jpg"},
            { month: "December",   emoji: "🎄", msg: "<b>Best end to the year✨✨</b>", img: "https://i.ibb.co/DH87n0SR/1000076366.jpg"},
            { month: "January",    emoji: "✨", msg: "<b>Despite of all the ups and downs HE choose holding my hand🤝✨</b>", img: "https://i.ibb.co/n88hSCyg/image.jpg"},
            { month: "February",   emoji: "🌹", msg: "<b>Difficult but HE Stood for me...<br><br><em>I LOVE YOU DHUNDHUN💖💖</em></br></br></b>", img: "https://i.ibb.co/wN17C2K8/image.jpg" }
        ];

        // --- 2. THE GENERATOR ---
        const grid = document.getElementById('bookGrid');
        
        memoryData.forEach((data, i) => {
            const bookDiv = document.createElement('div');
            bookDiv.className = 'book';
            bookDiv.onclick = function(e) { openBook(this, e); };
            
            bookDiv.innerHTML = `
                <div class="page inner">
                    <img src="${data.img}">
                    <p style="font-weight: bold; margin: 5px 0 2px 0; font-size: 0.9rem;">${data.month}</p>
                    <div style="font-size: 0.85rem; color: #333; line-height: 1.3; padding: 0 5px;">
                        ${data.msg}
                    </div>
                </div>
                <div class="page front">
                    <span style="position:absolute; top:10px; left:10px;">${data.emoji}</span>
                    <span style="position:absolute; bottom:10px; right:10px;">❤️</span>
                    <h3>Chapter : ${i+1}</h3>
                </div>
            `;
            grid.appendChild(bookDiv);
        });

        // --- UPDATED: CENTRALIZED HEART SPAWNING LOGIC ---
        function spawnHeart(x, y, initialBurst) {
            const heart = document.createElement('div');
            heart.innerHTML = "❤️";
            heart.className = 'heart-pop';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';

            // Randomize trajectory (further spread for initial burst)
            const spreadMult = initialBurst ? 300 : 200;
            const yOffset = initialBurst ? 100 : 50;

            const xDir = (Math.random() - 0.5) * spreadMult;
            const yDir = -Math.random() * spreadMult - yOffset;

            heart.style.setProperty('--x', `${xDir}px`);
            heart.style.setProperty('--y', `${yDir}px`);

            // Slight random scaling for variety
            const scaleVar = 1 + (Math.random() - 0.5) * 0.4; // 0.8 to 1.2 initial scale
            heart.style.transform = `scale(${scaleVar})`;

            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3000);
        }

        // --- HEART POP ON BOOK CLICK ---
        function openBook(book, event) {
            book.classList.toggle('open');
            // Small burst on click
            for (let i = 0; i < 5; i++) {
                spawnHeart(event.pageX, event.pageY, false);
            }
        }
    </script>
</body>
</html>
